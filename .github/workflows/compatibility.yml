name: Compatibility CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      profile:
        description: Compatibility profile to execute
        required: true
        default: release
        type: choice
        options:
          - quick
          - full
          - release
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: compatibility-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# This workflow is a compatibility mirror. The current main Mac's complete
# exact-SHA gate and same-SHA real Codex App canary remain authoritative.
jobs:
  plan:
    name: Plan and CI contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tier: ${{ steps.classify.outputs.tier }}
      run_full: ${{ steps.classify.outputs.run_full }}
      run_state_fuzz: ${{ steps.classify.outputs.run_state_fuzz }}
      run_generator_fuzz: ${{ steps.classify.outputs.run_generator_fuzz }}
      run_install: ${{ steps.classify.outputs.run_install }}
      run_tag_identity: ${{ steps.classify.outputs.run_tag_identity }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Run independent CI helper tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -W error -m unittest discover -s .github/ci/tests -v
      - name: Validate the canonical 615-test inventory
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python .github/ci/compatibility.py validate-manifest
          --manifest .github/ci/test-shards.json
          --output inventory-v1.json
      - name: Classify this run fail closed
        id: classify
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python .github/ci/compatibility.py classify
          --event-name "$GITHUB_EVENT_NAME"
          --event-path "$GITHUB_EVENT_PATH"
          --github-sha "$GITHUB_SHA"
          --manual-profile "${{ inputs.profile || 'release' }}"
          --expected-total-tests 615
          --output plan-v1.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-plan
          path: |
            plan-v1.json
            inventory-v1.json
          if-no-files-found: error
          retention-days: 7

  quick:
    name: Quick semantic regression (Python 3.9)
    needs: plan
    if: needs.plan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ADAPTIVE_FUZZ_CASES: "25"
      ADAPTIVE_STATE_FUZZ_CASES: "25"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.9"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Check complete reviewed range whitespace
        run: python scripts/check_whitespace_range.py
      - name: Compile shipped Python, tests, and CI helpers
        run: python -W error -m compileall -q codex-loop-prompt-architect/scripts scripts tests .github/ci
      - name: Validate skill package
        run: python codex-loop-prompt-architect/scripts/validate_skill.py
      - name: Check installer syntax
        run: bash -n scripts/install.sh
      - name: Run required quick semantic tests
        run: >-
          python -W error -m unittest -v
          tests.test_adaptive_runtime_transport
          tests.test_incident_p0_negative
          tests.test_adaptive_state_mcp
          tests.test_mcp_registration
          tests.test_runtime_python_binding
          tests.test_release_contract
          tests.test_release_identity
          tests.test_whitespace_range

  full:
    name: Canonical shard ${{ matrix.shard }} (Python 3.13)
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.run_full == 'true'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: ["1", "2", "3", "4"]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADAPTIVE_FUZZ_CASES: "25"
      ADAPTIVE_STATE_FUZZ_CASES: "25"
      COVERAGE_FILE: .coverage.shard-${{ matrix.shard }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Run the reviewed shard once under branch coverage
        run: >-
          python -W error -m coverage run --parallel-mode
          .github/ci/compatibility.py run-shard
          --manifest .github/ci/test-shards.json
          --shard "${{ matrix.shard }}"
          --tested-sha "$GITHUB_SHA"
          --output ".ci-shard-${{ matrix.shard }}.json"
      - name: Upload unique shard evidence even after failure
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-shard-${{ matrix.shard }}
          path: |
            .ci-shard-${{ matrix.shard }}.json
            .coverage.shard-${{ matrix.shard }}.*
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  fuzz-generator:
    name: Generator fuzz (5000 cases, seed 20260710)
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.run_generator_fuzz == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      case_count: ${{ steps.profile.outputs.case_count }}
      seed: ${{ steps.profile.outputs.seed }}
    env:
      ADAPTIVE_FUZZ_CASES: "5000"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Record deterministic fuzz profile
        id: profile
        run: |
          echo "case_count=5000" >> "$GITHUB_OUTPUT"
          echo "seed=20260710" >> "$GITHUB_OUTPUT"
          echo "FUZZ_PROFILE lane=generator cases=5000 seed=20260710"
      - run: >-
          python -W error -m unittest -v
          tests.test_adaptive_fuzz.AdaptiveMalformedInputFuzzTests.test_malformed_nested_values_never_crash_validation_or_render

  fuzz-state:
    name: State fuzz (5000 cases, seed 20260711)
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.run_state_fuzz == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      case_count: ${{ steps.profile.outputs.case_count }}
      seed: ${{ steps.profile.outputs.seed }}
    env:
      ADAPTIVE_STATE_FUZZ_CASES: "5000"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Record deterministic fuzz profile
        id: profile
        run: |
          echo "case_count=5000" >> "$GITHUB_OUTPUT"
          echo "seed=20260711" >> "$GITHUB_OUTPUT"
          echo "FUZZ_PROFILE lane=state cases=5000 seed=20260711"
      - run: >-
          python -W error -m unittest -v
          tests.test_adaptive_state_runtime.AdaptiveStateRuntimeTests.test_malformed_and_random_sequences_never_mutate_or_corrupt

  coverage:
    name: Canonical all-shipped branch coverage
    needs: [plan, full]
    if: needs.plan.result == 'success' && needs.plan.outputs.run_full == 'true' && needs.full.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      total_tests: ${{ steps.verify.outputs.total_tests }}
      coverage_percent: ${{ steps.summary.outputs.coverage_percent }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: compatibility-shard-*
          path: .coverage-data
          merge-multiple: true
      - name: Verify all four execution manifests before combining coverage
        id: verify
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python .github/ci/compatibility.py verify-artifacts
          --manifest .github/ci/test-shards.json
          --artifact-dir .coverage-data
          --tested-sha "$GITHUB_SHA"
          --output shard-summary-v1.json
      - name: Combine coverage without rerunning tests
        run: |
          coverage combine .coverage-data
          coverage report
          coverage json -o coverage.json
          coverage xml
      - name: Enforce branch coverage and shadow equivalence
        id: summary
        run: >-
          python .github/ci/compatibility.py coverage-summary
          --coverage-json coverage.json
          --minimum 80
          --baseline 80.02
          --tolerance 0.01
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-coverage
          path: |
            coverage.xml
            coverage.json
            shard-summary-v1.json
          if-no-files-found: error
          retention-days: 7

  install-linux:
    name: Linux isolated install and registration
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.run_install == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Install twice and validate latest manifest
        run: |
          CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
          CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
          receipt="$(find "$RUNNER_TEMP/codex-home/install-receipts/codex-loop-prompt-architect" -type f -name '*.json' | sort | tail -n 1)"
          python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/verify_installation.py" --schema "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/references/install-manifest.schema.json" --check-manifest "$receipt"

  macos-install:
    name: macOS isolated install and registration
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.run_install == 'true'
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Install into isolated Codex home
        run: CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
      - name: Validate installed skill and manifest
        run: |
          python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/validate_skill.py"
          receipt="$(find "$RUNNER_TEMP/codex-home/install-receipts/codex-loop-prompt-architect" -type f -name '*.json' | sort | tail -n 1)"
          python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/verify_installation.py" --schema "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/references/install-manifest.schema.json" --check-manifest "$receipt"

  tag-identity:
    name: Exact protected-main tag identity (compatibility only)
    needs: plan
    if: needs.plan.result == 'success' && needs.plan.outputs.run_tag_identity == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact tag, VERSION, changelog, and protected main ancestry
        run: python scripts/check_release_identity.py --expected-sha "$GITHUB_SHA" --tag "$GITHUB_REF_NAME"

  final-gate:
    name: Final gate
    needs:
      - plan
      - quick
      - full
      - fuzz-generator
      - fuzz-state
      - coverage
      - install-linux
      - macos-install
      - tag-identity
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Download the immutable plan
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compatibility-plan
          path: .compatibility-plan
      - name: Require exact planned job results and evidence
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: >-
          python .github/ci/compatibility.py verify-gate
          --plan .compatibility-plan/plan-v1.json
          --needs-json "$NEEDS_JSON"
