name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONWARNINGS: error
    steps:
      - uses: actions/checkout@v4
      - name: Check patch whitespace
        run: git show --check --format= HEAD
      - name: Compile Python
        run: >-
          python3 -m py_compile
          codex-loop-prompt-architect/scripts/loop_prompt_scaffold.py
          codex-loop-prompt-architect/scripts/validate_skill.py
      - name: Validate skill package
        run: python3 codex-loop-prompt-architect/scripts/validate_skill.py
      - name: Check installer syntax
        run: bash -n scripts/install.sh
      - name: Run semantic regression suite
        run: python3 -m unittest discover -s tests -v
