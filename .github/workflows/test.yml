name: Compatibility Test

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compatibility-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

# This workflow is a compatibility mirror. Root-owned/read-only Mac mini
# attestation, followed by the same-SHA real Codex App canary, is authoritative.
jobs:
  quick:
    name: Quick semantic regression (Python 3.9)
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_FUZZ_CASES: "25"
      ADAPTIVE_STATE_FUZZ_CASES: "25"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.9"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Check complete reviewed range whitespace
        run: python scripts/check_whitespace_range.py
      - name: Compile shipped Python and tests
        run: python -W error -m compileall -q codex-loop-prompt-architect/scripts scripts tests
      - name: Validate skill package
        run: python codex-loop-prompt-architect/scripts/validate_skill.py
      - name: Check installer syntax
        run: bash -n scripts/install.sh
      - name: Run required quick semantic tests
        run: >-
          python -W error -m unittest -v
          tests.test_adaptive_runtime_transport
          tests.test_incident_p0_negative
          tests.test_adaptive_state_mcp
          tests.test_mcp_registration
          tests.test_release_contract
          tests.test_release_identity
          tests.test_whitespace_range

  full:
    name: Full deterministic suite and coverage data (Python 3.13)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_FUZZ_CASES: "25"
      ADAPTIVE_STATE_FUZZ_CASES: "25"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Run every deterministic test once under branch coverage
        run: coverage run --parallel-mode -m unittest discover -s tests -q
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

  fuzz-generator:
    name: Generator fuzz (5000 cases)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_FUZZ_CASES: "5000"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - run: >-
          python -W error -m unittest -v
          tests.test_adaptive_fuzz.AdaptiveMalformedInputFuzzTests.test_malformed_nested_values_never_crash_validation_or_render

  fuzz-state:
    name: State fuzz (5000 cases)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_STATE_FUZZ_CASES: "5000"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - run: >-
          python -W error -m unittest -v
          tests.test_adaptive_state_runtime.AdaptiveStateRuntimeTests.test_malformed_and_random_sequences_never_mutate_or_corrupt

  coverage:
    name: All-shipped branch coverage
    needs: full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-data
          path: .coverage-data
      - name: Report the full lane's coverage without rerunning tests
        run: |
          coverage combine .coverage-data
          coverage report
          coverage xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  install-linux:
    name: Linux isolated install and registration
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Install twice and validate latest manifest
        run: |
          CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
          CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
          receipt="$(find "$RUNNER_TEMP/codex-home/install-receipts/codex-loop-prompt-architect" -type f -name '*.json' | sort | tail -n 1)"
          python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/verify_installation.py" --schema "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/references/install-manifest.schema.json" --check-manifest "$receipt"

  macos-install:
    name: macOS isolated install and registration
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Install into isolated Codex home
        run: CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
      - name: Validate installed skill and manifest
        run: |
          python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/validate_skill.py"
          receipt="$(find "$RUNNER_TEMP/codex-home/install-receipts/codex-loop-prompt-architect" -type f -name '*.json' | sort | tail -n 1)"
          python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/verify_installation.py" --schema "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/references/install-manifest.schema.json" --check-manifest "$receipt"

  tag-identity:
    name: Exact protected-main tag identity (compatibility only)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify exact tag, VERSION, changelog, and protected main ancestry
        run: python scripts/check_release_identity.py --expected-sha "$GITHUB_SHA" --tag "$GITHUB_REF_NAME"
