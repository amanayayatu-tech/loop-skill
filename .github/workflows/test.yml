name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick regression (Python 3.9)
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_FUZZ_CASES: "100"
      ADAPTIVE_STATE_FUZZ_CASES: "25"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Check patch whitespace
        run: git show --check --format= HEAD
      - name: Compile Python
        run: python -W error -m compileall -q codex-loop-prompt-architect/scripts tests
      - name: Validate skill package
        run: python codex-loop-prompt-architect/scripts/validate_skill.py
      - name: Check installer syntax
        run: bash -n scripts/install.sh
      - name: Run quick semantic regression suite
        run: python -W error -m unittest discover -s tests -v

  full-fuzz:
    name: Full semantic gate (Python 3.13)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_FUZZ_CASES: "5000"
      ADAPTIVE_STATE_FUZZ_CASES: "5000"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Run full semantic regression suite
        run: python -W error -m unittest discover -s tests -q

  coverage:
    name: Coverage baseline
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_FUZZ_CASES: "100"
      ADAPTIVE_STATE_FUZZ_CASES: "25"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Measure branch coverage
        run: coverage run -m unittest discover -s tests
      - name: Report coverage
        run: coverage report
      - name: Export coverage XML
        run: coverage xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  macos-install:
    name: macOS installation smoke
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: macos-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-test.txt
      - name: Install into isolated Codex home
        run: CODEX_HOME="$RUNNER_TEMP/codex-home" PYTHON=python ./scripts/install.sh
      - name: Validate installed skill
        run: python "$RUNNER_TEMP/codex-home/skills/codex-loop-prompt-architect/scripts/validate_skill.py"
