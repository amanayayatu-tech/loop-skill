  - id: INV-GATEWAY-EVIDENCE-001
    title: Gateway PASS requires current artifact dispatch and report
    level: CORE_INVARIANT
    status: ACTIVE
    scope: [Worker validation projection, review handoff, report recovery]
    rationale: A BLOCKED report or an old artifact must not become current PASS evidence merely because it is structurally valid.
    normative_statement: A schema-v3 PASS projection requires one Goal's current Worker dispatch, current artifact digest, and a matching PASS formal report on that current SENT outbox; blocked stale-artifact stale-dispatch and report-only dispatch evidence has no PASS side effect.
    non_goals: [requiring product execution again when a matching staged report exists, treating a local check as independent review]
    allowed_evolution: [extend formal report fields or projection views while retaining the three-way current binding]
    authoritative_sources: [SPEC.md, codex-loop-prompt-architect/references/adaptive-loop-contract.md]
    implementation_surfaces: [codex-loop-prompt-architect/scripts/loop_architect/state_runtime.py, codex-loop-prompt-architect/scripts/adaptive_state_mcp.py]
    schema_surfaces: [codex-loop-prompt-architect/references/adaptive-state.schema.json, codex-loop-prompt-architect/references/adaptive-mutation.schema.json]
    test_surfaces: [tests/test_adaptive_state_mcp.py, tests/test_state_runtime_reports.py]
    evidence_surfaces: [docs/RELEASING.md]
    adr: [docs/adr/0010-mcp-state-gateway.md]
