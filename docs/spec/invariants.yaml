    introduced_version: 3.2.0

  - id: INV-PROTOCOL-001
    title: Negotiated MCP protocol truth is source-qualified
    level: PUBLIC_CONTRACT
    status: ACTIVE
    scope: [App canary receipt, negotiated protocol observation]
    rationale: Client-requested and server-supported versions do not prove the negotiated result.
    normative_statement: A receipt records the negotiated protocol only when the host exchange exposes it; otherwise status is UNAVAILABLE_BY_HOST, value is null, and client and server observations remain separately attributed without being promoted to negotiation proof.
    non_goals: [guessing a negotiated value, making host unavailability alone a release blocker]
    allowed_evolution: [adopt a new host observation source, version the receipt schema when public fields change]
    authoritative_sources: [docs/RELEASING.md, codex-loop-prompt-architect/references/app-canary-receipt.schema.json]
    implementation_surfaces: [codex-loop-prompt-architect/scripts/validate_app_canary_receipt.py]
