  - id: INV-GATEWAY-001
    title: Schema-v3 MCP State Gateway is the only new-loop canonical writer
    level: CORE_INVARIANT
    status: ACTIVE
    scope: [schema-v3 initialization, canonical state mutation, State-Writer migration]
    rationale: A session State-Writer made canonical progress depend on a single App message wakeup channel.
    normative_statement: New schema-v3 Adaptive loops write canonical state only through a host-attested MCP State Gateway, create no session State-Writer task, and permit v1/v2 migration only by explicit paused lease-free outbox-quiescent MIGRATE_V2_TO_V3.
    non_goals: [removing legacy state readability, claiming App message delivery is bug-free, automatically migrating a live loop]
    allowed_evolution: [add Gateway operations with reviewed schemas and equivalent atomicity, replace the MCP implementation while retaining attested single-writer semantics]
    authoritative_sources: [SPEC.md, codex-loop-prompt-architect/references/adaptive-loop-contract.md]
    implementation_surfaces: [codex-loop-prompt-architect/scripts/adaptive_state_mcp.py, codex-loop-prompt-architect/scripts/loop_architect/state_runtime.py]
    schema_surfaces: [codex-loop-prompt-architect/references/adaptive-state.schema.json, codex-loop-prompt-architect/references/adaptive-mutation.schema.json]
    test_surfaces: [tests/test_adaptive_state_mcp.py, tests/test_state_runtime_migration.py]
    evidence_surfaces: [docs/RELEASING.md]
    adr: [docs/adr/0010-mcp-state-gateway.md]
