  - id: INV-HOST-COOPERATIVE-OPERATION-001
    title: Gateway binds every operation to its prepared route and host turn
    level: CORE_INVARIANT
    status: ACTIVE
    scope: [schema-v3 task bootstrap, heartbeat observations, transport observations, route sending, heartbeat pausing, finalization]
    rationale: Current Codex hosts expose task and automation identifiers and send return thread ids, but no provider-signed subtool receipt. The Gateway must resist ordinary crashes duplication stale observations and route mismatches without claiming Byzantine resistance against a Controller that can forge every App call.
    normative_statement: REGISTER_TASK REGISTER_HEARTBEAT RECORD_HEARTBEAT_OBSERVATION RECORD_ROUTE_SENT RECORD_TRANSPORT_OBSERVATION ACK_TRANSPORT_PAUSE and ACK_FINALIZATION bind real App return values or readback to the current host-attested Controller turn and exact canonical identity. RECORD_ROUTE_SENT requires the returned target thread id to equal its one PREPARED outbox and obtains the exact payload digest only from that outbox. ACK_TRANSPORT_PAUSE and ACK_FINALIZATION require a PAUSED readback that exactly matches the one registered heartbeat. Missing malformed stale wrong-target wrong-outbox wrong-heartbeat or mismatched optional stronger-receipt evidence returns a specific zero-side-effect rejection. A present x-codex-app-action-receipt-v1 carrier is strictly validated as stronger evidence, but its absence is not a normal-path blocker and no operation claims a provider-signed receipt that the host does not expose.
    non_goals: [Byzantine resistance to a malicious Controller that can forge every App call, treating a transcript as provider-signed evidence, promoting a send observation itself to PASS]
    allowed_evolution: [adopt a provider-signed action-result carrier as optional stronger evidence while preserving host-cooperative route and readback binding]
    authoritative_sources: [SPEC.md, codex-loop-prompt-architect/references/adaptive-loop-contract.md]
    implementation_surfaces: [codex-loop-prompt-architect/scripts/adaptive_state_mcp.py, codex-loop-prompt-architect/scripts/loop_architect/state_runtime.py]
    schema_surfaces: [codex-loop-prompt-architect/references/adaptive-mutation.schema.json]
    test_surfaces: [tests/test_adaptive_state_mcp.py, tests/test_state_runtime_recovery.py]
    evidence_surfaces: [README.md, README.en.md, docs/RELEASING.md]
    adr: [docs/adr/0010-mcp-state-gateway.md]
    introduced_version: 3.3.0

  - id: INV-CAPTURED-GIT-DIFF-001
    title: Raw Git patch bytes stay runtime-owned through Worker PASS evidence
    level: CORE_INVARIANT
    status: ACTIVE
    scope: [schema-v3 runtime codec, binary diff capture, Worker PASS review handoff]
    rationale: A binary patch passed through a model-authored report string can be altered before review evidence binds it.
    normative_statement: CAPTURE_COMPLETE_DIFF captures raw Git bytes and reverse-validates them before storing a digest-addressed 0444 capture under a non-symlink confined control directory. CAPTURED_GIT_DIFF_V1 contains only the SHA-256 identity; runtime derives the capture path, rejects symlinks and mismatched bytes, and never accepts a report-supplied .codex-loop path or patch payload.
    non_goals: [turning .codex-loop capture files into product write scope, allowing model-authored binary patches]
    allowed_evolution: [add a runtime-owned capture manifest while preserving digest-addressed raw-byte validation]
    authoritative_sources: [SPEC.md, codex-loop-prompt-architect/references/adaptive-loop-contract.md]
    implementation_surfaces: [codex-loop-prompt-architect/scripts/loop_architect/state_runtime.py, codex-loop-prompt-architect/scripts/adaptive_state_runtime.py]
    schema_surfaces: [codex-loop-prompt-architect/references/adaptive-state.schema.json]
    test_surfaces: [tests/test_state_runtime_io.py]
    evidence_surfaces: [README.md, README.en.md, docs/RELEASING.md]
    adr: [docs/adr/0010-mcp-state-gateway.md]
    introduced_version: 3.3.0

  - id: INV-TRANSPORT-DEGRADATION-001
    title: Matching transport faults pause rather than spin
    level: PUBLIC_CONTRACT
    status: ACTIVE
    scope: [schema-v3 transport observation, heartbeat, user notification]
    rationale: Repeating the same failing App transport action indefinitely consumes control-plane budget without new evidence.
    normative_statement: A host-cooperative observation binds one matching outbox/fingerprint failure, observed time, and registered-heartbeat flag to the current host turn. The first such failure retains that outbox; two natural heartbeat observations or fifteen minutes enter WAITING_TRANSPORT_RECOVERY, immediately block every PREPARE_ROUTE, require a real matching PAUSED readback before projecting the business heartbeat PAUSED, and require one user notification. A later matching observation has zero side effects until authorized recovery.
    non_goals: [pretending a transport fault is a product repair, using an outer Supervisor as a second route channel]
    allowed_evolution: [tighten an evidence-backed threshold or notification representation through a reviewed public-contract change]
    authoritative_sources: [SPEC.md, codex-loop-prompt-architect/references/adaptive-loop-contract.md]
    implementation_surfaces: [codex-loop-prompt-architect/scripts/loop_architect/state_runtime.py]
    schema_surfaces: [codex-loop-prompt-architect/references/adaptive-state.schema.json]
    test_surfaces: [tests/test_adaptive_state_mcp.py]
    evidence_surfaces: [docs/RELEASING.md]
    adr: [docs/adr/0010-mcp-state-gateway.md]
    introduced_version: 3.3.0
